[build]
  command = "npm run build"
  # This tells Netlify where the adapter actually placed the build output
  publish = ".svelte-kit/netlify"

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/_app/immutable/*"
  [headers.values]
    cache-control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.gltf"
  [headers.values]
    Content-Type = "model/gltf+json"
    cache-control = "public, max-age=604800, stale-while-revalidate=86400"

[[headers]]
  for = "/*.bin"
  [headers.values]
    cache-control = "public, max-age=604800, stale-while-revalidate=86400"